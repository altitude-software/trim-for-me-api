name: Deploy to Homelab

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: self-hosted
    environment: DEV
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write .env
        run: |
          cat <<EOF > .env
          NODE_ENV=${{ secrets.NODE_ENV }}
          PORT=${{ secrets.PORT }}
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=${{ secrets.DB_NAME }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          EOF

      - name: Start Postgres
        run: docker compose up -d

      - name: Build
        run: npm run build

      - name: Restart with pm2
        run: |
          pm2 restart trim-for-me-api --update-env || pm2 start dist/main.js --name trim-for-me-api
          pm2 save